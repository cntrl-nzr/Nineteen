<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book of God - Realistic 3D</title>
<style>

body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #1a1a1a, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Garamond', serif;
  overflow: hidden;
}
.Page0 {
  display: flex;               /* enable flexbox */
  justify-content: center;     /* center horizontally */
  align-items: center;         /* center vertically */
     height: 100%;               /* full viewport height (or set a specific height) */
  text-align: center;          /* optional, for multi-line text */
      font-size: xx-large;
}
#bookClosed {
  width: 280px;
  height: 360px;
  background: linear-gradient(145deg, #8b5e3c 0%, #5a3c23 100%);
  box-shadow: 0 16px 60px rgba(0,0,0,0.9), inset 0 0 15px rgba(255,255,255,0.05);
  color: #ffd700;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
  font-size: 24px;
  text-shadow: 1px 1px 3px #000;
  border: 3px solid #a87e3b;
  transform: rotateX(15deg) rotateY(-20deg);
  perspective: 1000px;
  position: relative;
}

/* Add 3D thickness layers to the closed book */
#bookClosed::before {
  content: '';
  position: absolute;
  top: 5px;
  left: 5px;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #7a4e2b 0%, #4a2f1a 100%);
  border-radius: 8px;
  z-index: -1;
  transform: translateZ(-6px);
}
#bookClosed::after {
  content: '';
  position: absolute;
  top: 10px;
  left: 10px;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #6a3d1a 0%, #3a2510 100%);
  border-radius: 8px;
  z-index: -2;
  transform: translateZ(-12px);
}

#bookOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

#bookContainer {
  width: 800px;
  height: 500px;
  perspective: 2500px;
  position: relative;
}

.book {
  width: 100%;
  height: 100%;
  display: flex;
  transform-style: preserve-3d;
  transform: rotateY(-10deg) rotateX(5deg);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.page {
  width: 50%;
  height: 100%;
  background: #fef5e0;
  border-radius: 3px;
  padding: 24px;
  font-size: 14px;
  position: relative;
  cursor: pointer;
  user-select: none;
  box-shadow: inset 0 0 15px rgba(0,0,0,0.2), 2px 0 10px rgba(0,0,0,0.2);
  overflow: hidden;
}

.page.left {
  border-right: 2px solid #b59e7d;
  z-index: 2;
}

.page.right {
  border-left: 2px solid #b59e7d;
  z-index: 1;
  position: relative;
  background: #fef5e0;
}

.page.right.ripped::after {
    content: '';
    position: absolute;
    top: 0;
    left: -15px;
    width: 30%;
    height: 100%;
    background: repeating-linear-gradient(174deg, rgb(0 0 0) 0, rgb(255 255 255) 4px, #00000000 5px);
    clip-path: polygon(0% 0%, 95% 0%, 100% 5%, 85% 10%, 92% 20%, 80% 30%, 90% 40%, 75% 50%, 85% 60%, 70% 70%, 80% 80%, 60% 90%, 75% 100%, 0% 100%);
    transform: rotate(2deg);
    z-index: 2;
}

#behindPage {
  position: absolute;
  top: 0;
  left: 50%;
  width: 50%;
  height: 100%;
  background: #fef5e0;
  padding: 24px;
  box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
  z-index: 0;
  border-left: 2px solid #b59e7d;
  display: none;
}

#closeBook {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 28px;
  background: transparent;
  border: none;
  cursor: pointer;
  color: red;
  z-index: 10;
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 36px;
  color: white;
  background: rgba(0,0,0,0.3);
  border-radius: 50%;
  width: 50px;
  height: 50px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 20;
  user-select: none;
}

#prevArrow {
  left: -70px;
}

#nextArrow {
  right: -70px;
}

.line {
  height: 2px;
  background: #d1c4b2;
  margin: 6px 0;
}

.pageNumber {
    position: absolute;
    bottom: 8px;
    right: 16px;
    font-size: 26px;
    color: #333;
}

/* Add to the end of your CSS */

@media (max-width: 768px) {
  #bookContainer {
    width: 90vw;   /* use viewport width */
    height: 60vh;  /* use viewport height */
    perspective: 1200px;
  }

  .book {
    transform: rotateY(-5deg) rotateX(2deg) scale(0.9);
  }

  #bookClosed {
    width: 180px;
    height: 240px;
    font-size: 18px;
    transform: rotateX(10deg) rotateY(-10deg);
  }

  #bookClosed::before {
    transform: translateZ(-4px);
  }
  #bookClosed::after {
    transform: translateZ(-8px);
  }

  .page {
    padding: 12px;
    font-size: 12px;
  }

  .arrow {
    width: 40px;
    height: 40px;
    font-size: 24px;
  }

  #prevArrow {
    left: -50px;
  }

  #nextArrow {
    right: -50px;
  }

  #closeBook {
    font-size: 24px;
    top: 8px;
    right: 8px;
  }

  .pageNumber {
    font-size: 18px;
    bottom: 4px;
    right: 8px;
  }
}

@media (max-width: 480px) {
  #bookContainer {
    height: 50vh;
  }

  .book {
    transform: rotateY(-3deg) rotateX(1deg) scale(0.8);
  }

  #bookClosed {
    width: 140px;
    height: 200px;
    font-size: 16px;
  }

  .page {
    font-size: 10px;
    padding: 8px;
  }

  .arrow {
    width: 32px;
    height: 32px;
    font-size: 20px;
  }
}
</style>
</head>
<body>

<div id="bookClosed">Book of God</div>

<div id="bookOverlay">
  <div id="bookContainer">
    <button id="closeBook">✕</button>
    <div class="book" id="book">
      <div class="page left" id="leftPage"></div>
      <div class="page right" id="rightPage">
        <div id="behindPage"></div>
      </div>
      <div class="arrow" id="prevArrow">&#8592;</div>
      <div class="arrow" id="nextArrow">&#8594;</div>
    </div>
  </div>
</div>

<script>
const bookClosed = document.getElementById('bookClosed');
const bookOverlay = document.getElementById('bookOverlay');
const closeBook = document.getElementById('closeBook');
const leftPage = document.getElementById('leftPage');
const rightPage = document.getElementById('rightPage');
const behindPage = document.getElementById('behindPage');
const prevArrow = document.getElementById('prevArrow');
const nextArrow = document.getElementById('nextArrow');
let currentPage = 0;



const funnyBibleLines = [
  "Only god can read this.",
  "You shall not comprehend this.",
  "Humans wont undertsand this.",
  "Your eyes will filter this."
];

function getRandomLine(){
  return funnyBibleLines[Math.floor(Math.random()*funnyBibleLines.length)];
}


function generateLines(){
  let content = '';
  // Random number of lines between 30 and 50
 const num = Math.floor(Math.random() * 5) + 1;
  for(let i=0;i<num;i++){
    content += `<div>${getRandomLine()}</div>`;
  }
  return content;
}

function updatePages(){

  if(currentPage === 18){
    leftPage.innerHTML = generateLines(18) + '<div class="pageNumber">18</div>';
    rightPage.innerHTML = generateLines(18) + '<div class="pageNumber">21</div>';
    rightPage.classList.add('ripped');
    behindPage.style.display = 'block';
    behindPage.innerHTML = generateLines(18) + '<div class="pageNumber">22</div>';
  } else {
	  if(currentPage === 0)
	  { leftPage.innerHTML = `<div class="Page0">Written By God</div>` + `<div class="pageNumber">${currentPage}</div>`;
	  }
	  else if(currentPage === 30)
	  { leftPage.innerHTML = `<a href="envelope.html">what is this should i click?</a>` + `<div class="pageNumber">${currentPage}</div>`;
	  }
	  else
	  { leftPage.innerHTML = generateLines(18) + `<div class="pageNumber">${currentPage}</div>`;
	  }
	  
    rightPage.innerHTML = generateLines(18) + `<div class="pageNumber">${currentPage+1}</div>`;
    rightPage.classList.remove('ripped');
    behindPage.style.display = 'none';
  }
}

bookClosed.addEventListener('click', ()=>{
  bookOverlay.style.display = 'flex';
  currentPage = 0;
  updatePages();
});

closeBook.addEventListener('click', ()=>{
  bookOverlay.style.display = 'none';
});

prevArrow.addEventListener('click', ()=>{
  if(currentPage>0){
    currentPage -= 2;
    updatePages();
  }
});

nextArrow.addEventListener('click', ()=>{
  currentPage += 2;
  updatePages();
});
</script>

</body>
</html>
