<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Envelope Physics</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #1a1a1a, #000000);
  overflow: hidden;
  font-family: serif;
}

/* MENU BUTTON */
#menuBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  z-index: 1000;
}

/* PROPER HIDDEN MENU */
#menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100%;
  background: rgba(0,0,0,0.95);
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.3s ease, opacity 0.3s ease;
  padding: 20px;
  color: white;
  z-index: 999;
}

#menu.open {
  transform: translateX(0);
  opacity: 1;
  pointer-events: auto;
}

.menu-item {
  margin: 15px 0;
  cursor: pointer;
  padding: 8px;
  border: 1px solid rgba(255,255,255,0.2);
}

#envelope {
  position: absolute;
  width: 170px;
  height: 115px;
  cursor: grab;
  transform: rotate(0deg);
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
}

.body {
  width: 100%;
  height: 100%;
  background: #f4f1e6;
  position: absolute;
  border-radius: 3px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  background: #e8e2cf;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transform-origin: top;
  transition: transform 0.6s ease;
}

#envelope.open .flap {
  transform: rotateX(180deg);
}

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
}

#letter {
  width: 360px;
  background: #f8f3e6;
  padding: 28px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.85);
  position: relative;
  animation: pop 0.35s ease;
  border: 1px solid rgba(0,0,0,0.2);
  clip-path: polygon(2% 4%, 98% 2%, 100% 30%, 97% 98%, 4% 100%, 0% 60%);
}

@keyframes pop {
  from { transform: scale(0.6) rotate(-5deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}

#close {
  position: absolute;
  top: 8px;
  right: 12px;
  border: none;
  background: transparent;
  font-size: 18px;
  cursor: pointer;
}

</style>
</head>
<body>

<button id="menuBtn">≡</button>

<div id="menu">
  <div class="menu-item" id="openMsg">Open Message</div>
  <div class="menu-item" id="closeMenu">Close Menu</div>
</div>

<div id="envelope">
  <div class="body"></div>
  <div class="flap"></div>
</div>

<div id="overlay">
  <div id="letter">
    <button id="close">✕</button>
    <h3 style="font-weight: normal; letter-spacing: 2px;">— Unmarked —</h3>
    <p style="line-height:1.6; font-size:14px; color:#2b2b2b;">
      If this has reached you, then something has already gone wrong.
      <br><br>
      Do not trust the path you took to get here. It was not yours.
      <br><br>
      There are marks you cannot see yet — but they are there.
      Watching. Waiting.
      <br><br>
      Burn this after reading.
      <br><br>
      — No return.
    </p>
  </div>
</div>

<script>
const env = document.getElementById('envelope');
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('close');
const menu = document.getElementById('menu');
const menuBtn = document.getElementById('menuBtn');
const openMsg = document.getElementById('openMsg');
const closeMenu = document.getElementById('closeMenu');

menuBtn.onclick = () => menu.classList.toggle('open');
closeMenu.onclick = () => menu.classList.remove('open');

openMsg.onclick = () => {
  env.classList.add('open');
  overlay.style.display = 'flex';
  menu.classList.remove('open');
};

let isDragging = false;
let vx = 0, vy = 0;
let lastX, lastY;

// center + spiral motion
let centerX = window.innerWidth / 2;
let centerY = window.innerHeight / 2;
let angle = 0;
let radius = 20;

// start exactly center
env.style.left = centerX + 'px';
env.style.top = centerY + 'px';

function getPos(e) {
  return e.touches ? e.touches[0] : e;
}

env.addEventListener('mousedown', start);
env.addEventListener('touchstart', start);

document.addEventListener('mousemove', move);
document.addEventListener('touchmove', move);

document.addEventListener('mouseup', end);
document.addEventListener('touchend', end);

function start(e) {
  isDragging = true;
  const p = getPos(e);
  lastX = p.clientX;
  lastY = p.clientY;
}

function move(e) {
  if (!isDragging) return;
  const p = getPos(e);

  vx = p.clientX - lastX;
  vy = p.clientY - lastY;

  env.style.left = env.offsetLeft + vx + 'px';
  env.style.top = env.offsetTop + vy + 'px';

  lastX = p.clientX;
  lastY = p.clientY;
}

function end() {
  isDragging = false;
}

function animate() {
  if (!isDragging) {
    // spiral idle motion
    angle += 0.01;
    radius += Math.sin(angle * 0.5) * 0.05;

    let targetX = centerX + Math.cos(angle) * radius;
    let targetY = centerY + Math.sin(angle) * radius;

    let dx = targetX - env.offsetLeft;
    let dy = targetY - env.offsetTop;

    vx += dx * 0.002;
    vy += dy * 0.002;

    let x = env.offsetLeft + vx;
    let y = env.offsetTop + vy;

    if (x <= 0 || x + env.offsetWidth >= window.innerWidth) {
      vx *= -0.85;
      x = Math.max(0, Math.min(window.innerWidth - env.offsetWidth, x));
    }

    if (y <= 0 || y + env.offsetHeight >= window.innerHeight) {
      vy *= -0.85;
      y = Math.max(0, Math.min(window.innerHeight - env.offsetHeight, y));
    }

    env.style.left = x + 'px';
    env.style.top = y + 'px';

    vx *= 0.98;
    vy *= 0.98;

    const rot = vx * 0.3;
    env.style.transform = `rotate(${rot}deg)`;
  }
  requestAnimationFrame(animate);
}
animate();

let moved = false;
env.addEventListener('mousemove', () => moved = true);

env.addEventListener('click', () => {
  if (!moved) {
    env.classList.add('open');
    setTimeout(() => {
      overlay.style.display = 'flex';
    }, 500);
  }
  moved = false;
});

closeBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  env.classList.remove('open');
});

</script>

</body>
</html>
