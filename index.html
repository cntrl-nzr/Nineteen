<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Envelope Physics</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #1a1a1a, #000000);
  overflow: hidden;
  font-family: serif;
}

#envelope {
  position: absolute;
  width: 170px;
  height: 115px;
  top: 40%;
  left: 40%;
  cursor: grab;
  transform: rotate(-10deg);
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
}

.body {
  width: 100%;
  height: 100%;
  background: #f4f1e6;
  position: absolute;
  border-radius: 3px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  background: #e8e2cf;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transform-origin: top;
  transition: transform 0.6s ease;
}

#envelope.open .flap {
  transform: rotateX(180deg);
}

/* subtle glow */
#envelope::after {
  content: "";
  position: absolute;
  inset: -10px;
  background: radial-gradient(circle, rgba(255,255,200,0.08), transparent 70%);
  pointer-events: none;
}

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
}

#letter {
  width: 360px;
  background: #f8f3e6;
  padding: 28px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.85);
  position: relative;
  animation: pop 0.35s ease;

  /* aged paper texture */
  background-image:
    radial-gradient(circle at 20% 20%, rgba(0,0,0,0.08), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.06), transparent 60%),
    repeating-linear-gradient(
      45deg,
      rgba(0,0,0,0.015) 0px,
      rgba(0,0,0,0.015) 2px,
      transparent 2px,
      transparent 6px
    );

  border: 1px solid rgba(0,0,0,0.2);

  /* torn edges illusion */
  clip-path: polygon(
    2% 4%, 98% 2%, 100% 30%, 97% 98%,
    4% 100%, 0% 60%
  );
}


@keyframes pop {
  from { transform: scale(0.6) rotate(-5deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}

#close {
  position: absolute;
  top: 8px;
  right: 12px;
  border: none;
  background: transparent;
  font-size: 18px;
  cursor: pointer;
}

</style>
</head>
<body>

<div id="envelope">
  <div class="body"></div>
  <div class="flap"></div>
</div>

<div id="overlay">
  <div id="letter">
    <button id="close">✕</button>
    <h3 style="font-weight: normal; letter-spacing: 2px;">— Unmarked —</h3>
    <p style="line-height:1.6; font-size:14px; color:#2b2b2b;">
      If this has reached you, then something has already gone wrong.
      <br><br>
      Do not trust the path you took to get here. It was not yours.
      <br><br>
      There are marks you cannot see yet — but they are there.
      Watching. Waiting.
      <br><br>
      Burn this after reading.
      <br><br>
      — No return.
    </p>
  </div>
</div>

<script>
const env = document.getElementById('envelope');
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('close');

let isDragging = false;
let vx = 0, vy = 0;
let lastX, lastY;

function getPos(e) {
  return e.touches ? e.touches[0] : e;
}

env.addEventListener('mousedown', start);
env.addEventListener('touchstart', start);

document.addEventListener('mousemove', move);
document.addEventListener('touchmove', move);

document.addEventListener('mouseup', end);
document.addEventListener('touchend', end);

function start(e) {
  isDragging = true;
  const p = getPos(e);
  lastX = p.clientX;
  lastY = p.clientY;
}

function move(e) {
  if (!isDragging) return;
  const p = getPos(e);

  vx = p.clientX - lastX;
  vy = p.clientY - lastY;

  env.style.left = env.offsetLeft + vx + 'px';
  env.style.top = env.offsetTop + vy + 'px';

  lastX = p.clientX;
  lastY = p.clientY;
}

function end() {
  isDragging = false;
}

function animate() {
  if (!isDragging) {
    let x = env.offsetLeft + vx;
    let y = env.offsetTop + vy;

    // bounce walls
    if (x <= 0 || x + env.offsetWidth >= window.innerWidth) {
      vx *= -0.85;
      x = Math.max(0, Math.min(window.innerWidth - env.offsetWidth, x));
    }

    if (y <= 0 || y + env.offsetHeight >= window.innerHeight) {
      vy *= -0.85;
      y = Math.max(0, Math.min(window.innerHeight - env.offsetHeight, y));
    }

    env.style.left = x + 'px';
    env.style.top = y + 'px';

    // friction
    vx *= 0.97;
    vy *= 0.97;

    // stop tiny jitter
    if (Math.abs(vx) < 0.05) vx = 0;
    if (Math.abs(vy) < 0.05) vy = 0;

    // rotate slightly based on motion
    const angle = vx * 0.5;
    env.style.transform = `rotate(${angle}deg)`;
  }
  requestAnimationFrame(animate);
}
animate();

let moved = false;
env.addEventListener('mousemove', () => moved = true);

// open envelope
env.addEventListener('click', () => {
  if (!moved) {
    env.classList.add('open');
    setTimeout(() => {
      overlay.style.display = 'flex';
    }, 500);
  }
  moved = false;
});

closeBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  env.classList.remove('open');
});

</script>

</body>
</html>
